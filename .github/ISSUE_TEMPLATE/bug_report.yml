name: Bug report
description: Report something that is broken
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting. Please search existing issues first.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Monstera version or commit
      placeholder: e.g. main @ abc1234
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 22.x
  - type: dropdown
    id: hosting
    attributes:
      label: Deployment
      options:
        - Local development
        - Vercel
        - Self-hosted (other)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Browser console, server logs, or screenshots
