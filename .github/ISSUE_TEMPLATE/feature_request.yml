name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Describe the problem and proposed solution. Search existing issues first.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about
  - type: checkboxes
    id: scope
    attributes:
      label: Area (optional)
      options:
        - label: Plant care / calendar
        - label: AI / diagnosis
        - label: Species profiles
        - label: Self-hosting / ops
        - label: i18n / UI
